<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100vw;
  height: 100vh;
  background: #0A0A14;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Status Bar ── */
.status-bar {
  flex-shrink: 0;
  height: 5.4%;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 7% 0.6%;
  color: white;
  font-size: 1.6vh;
  font-weight: 600;
  position: relative;
  z-index: 20;
}

.status-time {
  font-weight: 700;
  letter-spacing: 0.02em;
}

.status-icons {
  display: flex;
  align-items: center;
  gap: 0.5vh;
}

/* ── Dynamic Island ── */
.dynamic-island {
  position: absolute;
  top: 1.2%;
  left: 50%;
  transform: translateX(-50%);
  width: 12.5%;
  height: 3.6%;
  background: #000;
  border-radius: 100px;
  z-index: 30;
}

/* ── Nav Header ── */
.nav-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.8% 6% 2.4%;
}

.nav-back {
  width: 4.4vh;
  height: 4.4vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-title {
  font-family: 'Outfit', sans-serif;
  font-size: 2.2vh;
  font-weight: 700;
  color: white;
  letter-spacing: -0.01em;
}

.nav-right {
  width: 4.4vh;
  height: 4.4vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Scanner Camera Area ── */
.scanner-area {
  flex-shrink: 0;
  height: 38%;
  background: #12121A;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Subtle camera noise texture */
.scanner-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.02) 0%, transparent 60%),
    radial-gradient(ellipse at 30% 60%, rgba(255,255,255,0.01) 0%, transparent 40%);
}

/* Scanner frame corners */
.scan-frame {
  position: absolute;
  width: 72%;
  height: 52%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.corner {
  position: absolute;
  width: 6.5%;
  height: 10%;
}

.corner-tl {
  top: 0; left: 0;
  border-top: 3px solid rgba(255,59,48,0.7);
  border-left: 3px solid rgba(255,59,48,0.7);
  border-top-left-radius: 8px;
}

.corner-tr {
  top: 0; right: 0;
  border-top: 3px solid rgba(255,59,48,0.7);
  border-right: 3px solid rgba(255,59,48,0.7);
  border-top-right-radius: 8px;
}

.corner-bl {
  bottom: 0; left: 0;
  border-bottom: 3px solid rgba(255,59,48,0.7);
  border-left: 3px solid rgba(255,59,48,0.7);
  border-bottom-left-radius: 8px;
}

.corner-br {
  bottom: 0; right: 0;
  border-bottom: 3px solid rgba(255,59,48,0.7);
  border-right: 3px solid rgba(255,59,48,0.7);
  border-bottom-right-radius: 8px;
}

/* ── Barcode visualization ── */
.barcode-container {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2vh;
}

.barcode-lines {
  display: flex;
  align-items: stretch;
  justify-content: center;
  height: 11vh;
  gap: 0;
}

.bar {
  background: rgba(255,255,255,0.85);
  height: 100%;
}

.bar-space {
  background: transparent;
  height: 100%;
}

.bar-short {
  height: 85%;
  align-self: flex-end;
}

.barcode-number {
  font-size: 1.3vh;
  font-weight: 500;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.35em;
  font-family: 'Courier New', monospace;
}

/* ── Red laser scan line ── */
.laser-line {
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 2px;
  background: #FF3B30;
  z-index: 5;
  box-shadow:
    0 0 16px rgba(255,59,48,0.7),
    0 0 6px rgba(255,59,48,0.9),
    0 0 40px rgba(255,59,48,0.3);
}

/* Laser glow halo */
.laser-line::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 0;
  right: 0;
  height: 18px;
  background: linear-gradient(180deg, transparent 0%, rgba(255,59,48,0.08) 40%, rgba(255,59,48,0.08) 60%, transparent 100%);
}

/* ── Scanning indicator ── */
.scanning-indicator {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 0.8vh;
  background: rgba(255,59,48,0.12);
  border: 1px solid rgba(255,59,48,0.25);
  padding: 0.6vh 1.8vh;
  border-radius: 100px;
  z-index: 5;
}

.scanning-dot {
  width: 0.8vh;
  height: 0.8vh;
  background: #FF3B30;
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.scanning-text {
  font-size: 1.3vh;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.08em;
}

/* ── Results Card (slides up from bottom) ── */
.results-card {
  flex: 1;
  background: #16161F;
  border-top: 1px solid rgba(255,255,255,0.06);
  border-radius: 2.8vh 2.8vh 0 0;
  padding: 2vh 6% 0;
  display: flex;
  flex-direction: column;
  position: relative;
  margin-top: -1.5vh;
  z-index: 10;
}

/* Green glow at top of results card */
.results-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,199,89,0.4), transparent);
}

/* Drag handle */
.drag-handle {
  width: 4.5vh;
  height: 0.5vh;
  background: rgba(255,255,255,0.15);
  border-radius: 100px;
  margin: 0 auto 2vh;
  flex-shrink: 0;
}

/* Product info */
.product-info {
  margin-bottom: 2vh;
  flex-shrink: 0;
}

.product-name {
  font-family: 'Outfit', sans-serif;
  font-size: 2.6vh;
  font-weight: 800;
  color: white;
  letter-spacing: -0.01em;
  margin-bottom: 0.4vh;
}

.product-subtitle {
  font-size: 1.5vh;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
}

/* Divider */
.card-divider {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 2.2vh;
  flex-shrink: 0;
}

/* ── Nutrition Grid (2x3) ── */
.nutrition-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1.2vh;
  margin-bottom: 2.8vh;
  flex-shrink: 0;
}

.nutrient-item {
  text-align: center;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 1.6vh;
  padding: 1.6vh 0.8vh;
}

.nutrient-value {
  font-family: 'Outfit', sans-serif;
  font-size: 3vh;
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 0.3vh;
}

.nutrient-label {
  font-size: 1.2vh;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.cal-color    { color: #FF9500; }
.protein-color { color: #FF6B6B; }
.carbs-color  { color: #4ECDC4; }
.fat-color    { color: #FFE66D; }
.fiber-color  { color: #34C759; }
.sugar-color  { color: #FF87AB; }

/* ── Add to Meal Button ── */
.add-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1vh;
  width: 100%;
  height: 5.8vh;
  background: #34C759;
  color: white;
  font-size: 1.8vh;
  font-weight: 700;
  border-radius: 1.4vh;
  border: none;
  letter-spacing: 0.02em;
  margin-bottom: 1.5vh;
}

/* ── Bottom Safe Area / Home Indicator ── */
.home-indicator-area {
  flex-shrink: 0;
  height: 3.4%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #16161F;
}

.home-indicator {
  width: 14%;
  height: 0.5vh;
  background: rgba(255,255,255,0.2);
  border-radius: 100px;
}
</style>
</head>
<body>

<!-- Dynamic Island -->
<div class="dynamic-island"></div>

<!-- Status Bar -->
<div class="status-bar">
  <span class="status-time">9:41</span>
  <div class="status-icons">
    <!-- Signal -->
    <svg width="1.6vh" height="1.2vh" viewBox="0 0 18 12" fill="white">
      <rect x="0" y="9" width="3" height="3" rx="0.5"/>
      <rect x="5" y="6" width="3" height="6" rx="0.5"/>
      <rect x="10" y="3" width="3" height="9" rx="0.5"/>
      <rect x="15" y="0" width="3" height="12" rx="0.5"/>
    </svg>
    <!-- WiFi -->
    <svg width="1.6vh" height="1.2vh" viewBox="0 0 16 12" fill="white">
      <path d="M8 10.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/>
      <path d="M4.5 8.5C5.5 7.2 6.7 6.5 8 6.5s2.5.7 3.5 2" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M1.5 5.5C3.5 3 5.5 2 8 2s4.5 1 6.5 3.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
    <!-- Battery -->
    <svg width="2.8vh" height="1.2vh" viewBox="0 0 28 12" fill="none">
      <rect x="0.5" y="0.5" width="23" height="11" rx="2.5" stroke="white" stroke-opacity="0.35"/>
      <rect x="24.5" y="3.5" width="2" height="5" rx="1" fill="white" fill-opacity="0.4"/>
      <rect x="2" y="2" width="20" height="8" rx="1.5" fill="white"/>

  </div>
</div>

<!-- Navigation Header -->
<div class="nav-header">
  <!-- Back chevron -->
  <div class="nav-back">
    <svg width="2.2vh" height="2.2vh" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </div>
  <span class="nav-title">Barcode Scanner</span>
  <!-- History icon -->
  <div class="nav-right">
    <svg width="2.2vh" height="2.2vh" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
  </div>
</div>

<!-- Scanner / Camera Area -->
<div class="scanner-area">
  <!-- Scanner frame corners -->
  <div class="scan-frame">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>

  <!-- Barcode visualization -->
  <div class="barcode-container">
    <div class="barcode-lines">
      <!-- Guard bars (left) -->
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:2px;"></div>
      <!-- Data bars (left half) -->
      <div class="bar-space" style="width:4px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar" style="width:5px;"></div>
      <div class="bar-space" style="width:3px;"></div>
      <div class="bar" style="width:3px;"></div>
      <div class="bar-space" style="width:4px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:6px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:3px;"></div>
      <div class="bar-space" style="width:3px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:5px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:4px;"></div>
      <div class="bar-space" style="width:3px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:5px;"></div>
      <!-- Center guard -->
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <!-- Data bars (right half) -->
      <div class="bar" style="width:4px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:3px;"></div>
      <div class="bar" style="width:5px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:3px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:4px;"></div>

      <div class="bar-space" style="width:3px;"></div>
      <div class="bar" style="width:2px;"></div>
      <div class="bar-space" style="width:2px;"></div>
      <div class="bar" style="width:2px;"></div>
    </div>
    <div class="barcode-number">0 16000 27550 3</div>
  </div>

  <!-- Red laser scan line -->
  <div class="laser-line"></div>

  <!-- Scanning indicator pill -->
  <div class="scanning-indicator">
    <div class="scanning-dot"></div>
    <span class="scanning-text">Scanning...</span>

</div>

<!-- Results Card -->

  <div class="drag-handle"></div>

  <div class="product-info">
    <div class="product-name">Nature Valley Protein Bar</div>

  <div class="card-divider"></div>

  <!-- Nutrition grid 2x3 -->
  <div class="nutrition-grid">

</div>

<!-- Home Indicator -->

  <div class="home-indicator"></div>
</div>

</body>
</html>
