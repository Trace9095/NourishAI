<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');
  body {
    width: 1080px; height: 1920px;
    background: #0A0A14;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow-top { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(52,199,89,0.1) 0%, transparent 70%); top: -200px; left: 50%; transform: translateX(-50%); }
  .glow-bottom { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,149,0,0.06) 0%, transparent 70%); bottom: 100px; right: -100px; }
  .grain { position: absolute; inset: 0; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

  .content {
    position: absolute; top: 180px; left: 60px; right: 60px; bottom: 300px;
    display: flex; flex-direction: column;
  }

  .badge {
    display: inline-block; align-self: flex-start;
    background: rgba(52,199,89,0.15); border: 1px solid rgba(52,199,89,0.3);
    color: #34C759; font-size: 14px; font-weight: 700;
    padding: 10px 22px; border-radius: 24px;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 32px;
  }

  .headline {
    font-size: 64px; font-weight: 800; color: white; line-height: 1.1;
    margin-bottom: 24px;
  }
  .headline span { color: #34C759; }

  .subtitle {
    font-size: 22px; color: rgba(255,255,255,0.5); line-height: 1.5;
    margin-bottom: 48px;
  }

  .feature-card {
    background: #12121A; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 28px 32px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 20px;
  }
  .feature-icon {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 24px;
  }
  .feature-icon.green { background: rgba(52,199,89,0.15); }
  .feature-icon.orange { background: rgba(255,149,0,0.15); }
  .feature-icon.blue { background: rgba(90,200,250,0.15); }
  .feature-icon.red { background: rgba(255,107,107,0.15); }

  .feature-text h3 { color: white; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .feature-text p { color: rgba(255,255,255,0.4); font-size: 15px; }

  .cta {
    position: absolute; bottom: 300px; left: 60px; right: 60px;
    text-align: center;
  }
  .cta-btn {
    display: inline-block;
    background: #34C759; color: #0A0A14;
    font-size: 20px; font-weight: 700;
    padding: 20px 60px; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(52,199,89,0.3);
  }
  .cta-sub {
    color: rgba(255,255,255,0.3); font-size: 14px; margin-top: 12px;
  }

  .logo-bar {
    position: absolute; bottom: 120px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .logo-dot { width: 36px; height: 36px; background: rgba(52,199,89,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .logo-text { color: white; font-size: 22px; font-weight: 700; }
  .logo-text span { color: #34C759; }
</style>
</head><body>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>
  <div class="grain"></div>

  <div class="content">
    <div class="badge">{{BADGE}}</div>
    <div class="headline">{{HEADLINE_1}}<br><span>{{HEADLINE_2}}</span></div>
    <div class="subtitle">{{SUBTITLE}}</div>

    <div class="feature-card">
      <div class="feature-icon green">{{ICON_1}}</div>
      <div class="feature-text"><h3>{{FEAT_1_TITLE}}</h3><p>{{FEAT_1_DESC}}</p></div>
    </div>
    <div class="feature-card">
      <div class="feature-icon orange">{{ICON_2}}</div>
      <div class="feature-text"><h3>{{FEAT_2_TITLE}}</h3><p>{{FEAT_2_DESC}}</p></div>
    </div>
    <div class="feature-card">
      <div class="feature-icon blue">{{ICON_3}}</div>
      <div class="feature-text"><h3>{{FEAT_3_TITLE}}</h3><p>{{FEAT_3_DESC}}</p></div>
    </div>
  </div>

  <div class="cta">
    <div class="cta-btn">Download Free</div>
    <div class="cta-sub">No credit card required</div>
  </div>

  <div class="logo-bar">
    <div class="logo-dot">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="none"><path d="M16 3c-6.5 3.5-11 10.5-11 17.5 0 3.8 1.7 7 4.8 9.1 1.8-5.2 4.4-9.4 6.2-11.6 1.8 2.2 4.4 6.4 6.2 11.6 3.1-2.1 4.8-5.3 4.8-9.1C27 13.5 22.5 6.5 16 3z" fill="#34C759"/><circle cx="16" cy="27" r="2" fill="#FF9500"/></svg>
    </div>
    <div class="logo-text">Nourish<span>AI</span></div>
  </div>
</body></html>
