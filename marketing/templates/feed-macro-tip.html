<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  background: #0A0A14;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  position: relative;
}

.bg-glow {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.1;
}
.glow-1 { background: #34C759; top: -200px; right: -100px; }
.glow-2 { background: #FF9500; bottom: -200px; left: -100px; }

.content {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 60px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(52,199,89,0.12);
  border: 1px solid rgba(52,199,89,0.25);
  border-radius: 40px;
  padding: 10px 22px;
  font-size: 15px;
  font-weight: 700;
  color: #34C759;
  text-transform: uppercase;
  letter-spacing: 2px;
  align-self: flex-start;
}
.badge svg {
  flex-shrink: 0;
}

.title {
  font-family: 'Outfit', sans-serif;
  font-size: 64px;
  font-weight: 900;
  color: white;
  line-height: 1.1;
  margin-top: 32px;
  letter-spacing: -2px;
}
.title .highlight { color: #34C759; }

.tip-card {
  background: rgba(255,255,255,0.03);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 12px 36px;
  margin-top: 40px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
}

.tip-row {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 24px 0;
  border-left: none;
  position: relative;
}
.tip-row:not(:last-child) {
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

/* Left accent border per row */
.tip-row::before {
  content: '';
  position: absolute;
  left: -36px;
  top: 16px;
  bottom: 16px;
  width: 2px;
  border-radius: 1px;
}
.tip-row.row-green::before { background: #34C759; }
.tip-row.row-orange::before { background: #FF9500; }
.tip-row.row-blue::before { background: #5AC8FA; }

.tip-number {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: 'Outfit', sans-serif;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.tip-number.num-green {
  background: rgba(52,199,89,0.15);
  color: #34C759;
  border: 1px solid rgba(52,199,89,0.25);
}
.tip-number.num-orange {
  background: rgba(255,149,0,0.15);
  color: #FF9500;
  border: 1px solid rgba(255,149,0,0.25);
}
.tip-number.num-blue {
  background: rgba(90,200,250,0.15);
  color: #5AC8FA;
  border: 1px solid rgba(90,200,250,0.25);
}

.tip-text {
  font-size: 22px;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
  font-weight: 500;
}
.tip-text strong { color: white; font-weight: 700; }
.tip-text .green { color: #34C759; font-weight: 700; }
.tip-text .orange { color: #FF9500; font-weight: 700; }
.tip-text .red { color: #FF6B6B; font-weight: 700; }

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 32px;
}
.logo {
  font-family: 'Outfit', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: white;
}
.logo .green { color: #34C759; }
.save-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 16px;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
}
.save-cta svg {
  flex-shrink: 0;
  opacity: 0.6;
}
</style>
</head>
<body>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="content">
  <div class="badge">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/></svg>
    MACRO TIP
  </div>

  <div class="title">
    {{TITLE_LINE1}}<br>
    <span class="highlight">{{TITLE_LINE2}}</span>
  </div>

  <div class="tip-card">
    <div class="tip-row row-green">
      <div class="tip-number num-green">01</div>
      <div class="tip-text">{{TIP1_TEXT}}</div>
    </div>
    <div class="tip-row row-orange">
      <div class="tip-number num-orange">02</div>
      <div class="tip-text">{{TIP2_TEXT}}</div>
    </div>
    <div class="tip-row row-blue">
      <div class="tip-number num-blue">03</div>
      <div class="tip-text">{{TIP3_TEXT}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="logo"><span class="green">Nourish</span>AI</div>
    <div class="save-cta">
      Save this for later
      <svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(255,255,255,0.4)" stroke="none"><path d="M5 3a2 2 0 0 0-2 2v16l9-4 9 4V5a2 2 0 0 0-2-2H5z"/></svg>
    </div>
  </div>
</div>
</body>
</html>
