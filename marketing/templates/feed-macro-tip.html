<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  background: #0A0A14;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  position: relative;
}

.bg-glow {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.1;
}
.glow-1 { background: #34C759; top: -200px; right: -100px; }
.glow-2 { background: #FF9500; bottom: -200px; left: -100px; }

.content {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 60px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(52,199,89,0.12);
  border: 1px solid rgba(52,199,89,0.25);
  border-radius: 40px;
  padding: 10px 20px;
  font-size: 16px;
  font-weight: 600;
  color: #34C759;
  text-transform: uppercase;
  letter-spacing: 1px;
  align-self: flex-start;
}

.title {
  font-family: 'Outfit', sans-serif;
  font-size: 64px;
  font-weight: 900;
  color: white;
  line-height: 1.1;
  margin-top: 32px;
  letter-spacing: -2px;
}
.title .highlight { color: #34C759; }

.tip-card {
  background: #1A1A2E;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 36px;
  margin-top: 40px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.tip-row {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 20px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.tip-row:last-child { border-bottom: none; }

.tip-emoji {
  font-size: 40px;
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  flex-shrink: 0;
}

.tip-text {
  font-size: 22px;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
  font-weight: 500;
}
.tip-text strong { color: white; font-weight: 700; }
.tip-text .green { color: #34C759; font-weight: 700; }
.tip-text .orange { color: #FF9500; font-weight: 700; }
.tip-text .red { color: #FF6B6B; font-weight: 700; }

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 32px;
}
.logo {
  font-family: 'Outfit', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: white;
}
.logo .green { color: #34C759; }
.save-cta {
  font-size: 16px;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
}
</style>
</head>
<body>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="content">
  <div class="badge">💡 Macro Tip</div>

  <div class="title">
    {{TITLE_LINE1}}<br>
    <span class="highlight">{{TITLE_LINE2}}</span>
  </div>

  <div class="tip-card">
    <div class="tip-row">
      <div class="tip-emoji">{{TIP1_EMOJI}}</div>
      <div class="tip-text">{{TIP1_TEXT}}</div>
    </div>
    <div class="tip-row">
      <div class="tip-emoji">{{TIP2_EMOJI}}</div>
      <div class="tip-text">{{TIP2_TEXT}}</div>
    </div>
    <div class="tip-row">
      <div class="tip-emoji">{{TIP3_EMOJI}}</div>
      <div class="tip-text">{{TIP3_TEXT}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="logo"><span class="green">Nourish</span>AI</div>
    <div class="save-cta">Save this for later 🔖</div>
  </div>
</div>
</body>
</html>
