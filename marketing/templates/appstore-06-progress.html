<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw;
  height: 100vh;
  background: #0A0A14;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  display: flex;
  flex-direction: column;
}

/* ── Status Bar ── */
.status-bar {
  flex-shrink: 0;
  height: 5.4vh;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 4.2vw 0.6vh;
  color: white;
}

.status-time {
  font-size: 1.7vh;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.status-icons {
  display: flex;
  align-items: center;
  gap: 0.8vw;
}

/* ── Dynamic Island ── */
.dynamic-island {
  position: absolute;
  top: 1.2vh;
  left: 50%;
  transform: translateX(-50%);
  width: 27vw;
  height: 3.6vh;
  background: #000000;
  border-radius: 2vh;
  z-index: 100;
}

/* ── Scrollable Content ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 2vh 5.5vw 12vh;
  -webkit-overflow-scrolling: touch;
}

/* Hide scrollbar */
.content::-webkit-scrollbar { display: none; }
.content { -ms-overflow-style: none; scrollbar-width: none; }

/* ── Page Header ── */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2.8vh;
}

.page-title {
  font-family: 'Outfit', sans-serif;
  font-size: 3.6vh;
  font-weight: 800;
  color: white;
  letter-spacing: -0.02em;
}

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 1.2vw;
  background: linear-gradient(135deg, #34C759, #2DA44E);
  color: white;
  font-size: 1.65vh;
  font-weight: 700;
  padding: 0.9vh 3.4vw;
  border-radius: 5vh;
  box-shadow: 0 0.4vh 1.6vh rgba(52, 199, 89, 0.35);
}

.streak-badge svg {
  flex-shrink: 0;
}

/* ── Weekly Bar Chart Card ── */
.chart-card {
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 2.4vh;
  padding: 2.6vh 4vw 2vh;
  margin-bottom: 2vh;
}

.chart-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2vh;
}

.chart-card-title {
  font-size: 1.8vh;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.chart-card-period {
  font-size: 1.5vh;
  font-weight: 500;
  color: rgba(255,255,255,0.3);
}

.chart-area {
  position: relative;
  height: 22vh;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 1vw;
}

/* Grid lines behind bars */
.grid-lines {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 5vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  pointer-events: none;
}

.grid-line {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.04);
}

.grid-line-label {
  position: absolute;
  right: 0;
  font-size: 1.15vh;
  color: rgba(255,255,255,0.2);
  font-weight: 500;
  transform: translateY(-50%);
}

/* Individual bars */
.bar-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8vh;
  z-index: 2;
  width: 9vw;
}

.bar-container {
  height: 16vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  width: 100%;
}

.bar {
  width: 7.2vw;
  border-radius: 1vh 1vh 0.3vh 0.3vh;
  background: linear-gradient(to top, rgba(52,199,89,0.5), rgba(78,205,196,0.5));
  position: relative;
}

.bar.active {
  background: linear-gradient(to top, #34C759, #4ECDC4);
  box-shadow: 0 0 2vh rgba(52,199,89,0.4), 0 -0.4vh 1.2vh rgba(78,205,196,0.25);
}

.bar-cal-label {
  font-size: 1.1vh;
  font-weight: 700;
  color: rgba(255,255,255,0.3);
  margin-bottom: 0.4vh;
  text-align: center;
}

.bar-cal-label.active {
  color: rgba(255,255,255,0.8);
}

.bar-day {
  font-size: 1.5vh;
  font-weight: 600;
  color: rgba(255,255,255,0.3);
}

.bar-day.active {
  color: white;
  font-weight: 800;
}

.bar-today-dot {
  width: 0.6vh;
  height: 0.6vh;
  border-radius: 50%;
  background: #34C759;
  margin-top: 0.3vh;
}

/* ── 2x2 Stats Grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.6vh 3vw;
  margin-bottom: 2vh;
}

.stat-card {
  background: #14141E;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 2.2vh;
  padding: 2.2vh 3.2vw;
  position: relative;
  overflow: hidden;
}

/* Colored accent line at top of each stat card */
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 10%;
  right: 10%;
  height: 2px;
  border-radius: 0 0 2px 2px;
}

.stat-card.orange::before { background: linear-gradient(90deg, transparent, #FF9500, transparent); }
.stat-card.red::before { background: linear-gradient(90deg, transparent, #FF6B6B, transparent); }
.stat-card.blue::before { background: linear-gradient(90deg, transparent, #5AC8FA, transparent); }
.stat-card.green::before { background: linear-gradient(90deg, transparent, #34C759, transparent); }

.stat-card-top {
  display: flex;
  align-items: center;
  gap: 1.4vw;
  margin-bottom: 1.2vh;
}

.stat-icon {
  width: 3.6vh;
  height: 3.6vh;
  border-radius: 1vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.stat-icon.orange { background: rgba(255,149,0,0.15); }
.stat-icon.red { background: rgba(255,107,107,0.15); }
.stat-icon.blue { background: rgba(90,200,250,0.15); }
.stat-icon.green { background: rgba(52,199,89,0.15); }

.stat-label {
  font-size: 1.4vh;
  font-weight: 600;
  color: rgba(255,255,255,0.45);
  line-height: 1.2;
}

.stat-value {
  font-family: 'Outfit', sans-serif;
  font-size: 4vh;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 0.4vh;
}

.stat-value.orange { color: #FF9500; }
.stat-value.red { color: #FF6B6B; }
.stat-value.blue { color: #5AC8FA; }
.stat-value.green { color: #34C759; }

.stat-goal {
  font-size: 1.3vh;
  color: rgba(255,255,255,0.28);
  font-weight: 500;
}

/* ── Weight Trend Card ── */
.trend-card {
  background: #14141E;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 2.2vh;
  padding: 2.4vh 3.5vw 1.6vh;
}

.trend-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2vh;
}

.trend-title {
  display: flex;
  align-items: center;
  gap: 1.6vw;
  font-size: 1.9vh;
  font-weight: 700;
  color: white;
}

.trend-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.6vw;
  background: rgba(52,199,89,0.12);
  border: 1px solid rgba(52,199,89,0.2);
  color: #34C759;
  font-size: 1.25vh;
  font-weight: 700;
  padding: 0.5vh 2vw;
  border-radius: 5vh;
}

.trend-chart {
  width: 100%;
  height: 16vh;
}

/* ── Tab Bar ── */
.tab-bar {
  flex-shrink: 0;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 10vh;
  background: #0A0A14;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: flex-start;
  justify-content: space-around;
  padding: 1.4vh 4vw 0;
}

.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5vh;
  opacity: 0.35;
}

.tab-item.active {
  opacity: 1;
}

.tab-item.active .tab-label {
  color: #34C759;
}

.tab-label {
  font-size: 1.15vh;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
}
</style>
</head>
<body>
