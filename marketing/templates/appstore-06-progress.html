<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1284px;
  height: 2778px;
  background: #0A0A14;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Background gradients */
.bg-gradient {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(52,199,89,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 70%, rgba(255,149,0,0.08) 0%, transparent 50%);
}

/* Headline area */
.headline-area {
  position: relative;
  z-index: 10;
  text-align: center;
  padding-top: 180px;
  padding-bottom: 60px;
}

.badge {
  display: inline-block;
  background: rgba(52,199,89,0.15);
  border: 1px solid rgba(52,199,89,0.3);
  color: #34C759;
  font-size: 28px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  padding: 12px 32px;
  border-radius: 50px;
  margin-bottom: 48px;
}

.headline {
  font-family: 'Outfit', sans-serif;
  font-size: 96px;
  font-weight: 900;
  color: white;
  line-height: 1.05;
  margin-bottom: 32px;
}

.headline .green { color: #34C759; }

.subheadline {
  font-size: 36px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  line-height: 1.5;
  max-width: 900px;
  margin: 0 auto;
}

/* Phone mockup */
.phone-container {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
}

.phone {
  width: 680px;
  height: 1400px;
  background: #12121A;
  border-radius: 60px;
  border: 4px solid rgba(255,255,255,0.1);
  overflow: hidden;
  position: relative;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(52,199,89,0.1);
}

/* Dynamic Island */
.dynamic-island {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 44px;
  background: black;
  border-radius: 22px;
}

/* Status bar */
.status-bar {
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  color: white;
  font-size: 22px;
  font-weight: 600;
}

/* App content */
.app-content {
  padding: 20px 32px;
}

/* Page header */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}

.page-title {
  font-family: 'Outfit', sans-serif;
  font-size: 36px;
  font-weight: 800;
  color: white;
}

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #34C759;
  color: white;
  font-size: 22px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 50px;
}

/* Bar chart */
.chart-section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 28px;
  padding: 28px 24px 20px;
  margin-bottom: 20px;
  position: relative;
}

.chart-area {
  position: relative;
  height: 200px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 8px;
}

/* Grid lines */
.grid-lines {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  pointer-events: none;
}

.grid-line {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.05);
}

/* Individual bars */
.bar-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 2;
  width: 56px;
}

.bar {
  width: 56px;
  border-radius: 8px 8px 0 0;
  background: linear-gradient(to top, #34C759, #4ECDC4);
  opacity: 0.7;
}

.bar.active {
  opacity: 1;
  box-shadow: 0 0 20px rgba(52,199,89,0.3);
}

.bar-label {
  font-size: 18px;
  font-weight: 600;
  color: rgba(255,255,255,0.35);
}

.bar-label.active {
  color: white;
}

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}

.stat-card {
  background: #16161F;
  border-radius: 24px;
  padding: 24px;
}

.stat-card-label {
  font-size: 18px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-card-value {
  font-family: 'Outfit', sans-serif;
  font-size: 40px;
  font-weight: 800;
  margin-bottom: 4px;
}

.stat-card-goal {
  font-size: 18px;
  color: rgba(255,255,255,0.35);
}

/* Trend card */
.trend-card {
  background: #16161F;
  border-radius: 24px;
  padding: 24px;
  width: 100%;
}

.trend-title {
  font-size: 24px;
  font-weight: 700;
  color: white;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.trend-chart {
  width: 100%;
  height: 140px;
}

/* Bottom glow */
.bottom-glow {
  position: absolute;
  bottom: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(52,199,89,0.2) 0%, transparent 70%);
  filter: blur(60px);
  z-index: 5;
}
</style>
</head>
<body>

<div class="bg-gradient"></div>

<!-- Headline -->
<div class="headline-area">
  <div class="badge">INSIGHTS</div>
  <div class="headline">Watch Your<br><span class="green">Progress</span></div>
  <div class="subheadline">Weekly reports. Streak tracking.<br>See how your nutrition improves over time.</div>
</div>

<!-- Phone mockup -->
<div class="phone-container">
  <div class="phone">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span>9:41</span>
      <span></span>
    </div>

    <div class="app-content">
      <!-- Header with title and streak -->
      <div class="page-header">
        <div class="page-title">This Week</div>
        <div class="streak-badge">
          <!-- Flame SVG icon -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
            <path d="M12 23c-4.97 0-8-3.03-8-7.5 0-3.82 2.42-7.23 4.5-9.5 0.28-0.3 0.72-0.3 1 0 0.82 0.88 1.7 2 2.3 3.2C12.5 7.8 13.5 7 14.5 5.5c0.22-0.33 0.68-0.38 0.96-0.1C18.03 7.67 20 11.18 20 15.5 20 19.97 16.97 23 12 23zM12 20c2.21 0 4-1.79 4-4 0-1.95-1.1-3.75-2.5-5.25-0.5 0.75-1 1.6-1.5 2.5-0.2 0.36-0.7 0.4-0.96 0.08C10.36 12.38 9.6 11.5 9 10.5 7.72 12.3 7 14.1 7 16c0 2.76 2.24 4 5 4z"/>
          </svg>
          7 Day Streak
        </div>
      </div>

      <!-- Weekly bar chart -->
      <div class="chart-section">
        <div class="chart-area">
          <!-- Grid lines -->
          <div class="grid-lines">
            <div class="grid-line"></div>
            <div class="grid-line"></div>
            <div class="grid-line"></div>
          </div>

          <!-- Mon -->
          <div class="bar-wrapper">
            <div class="bar" style="height: 140px;"></div>
            <div class="bar-label">M</div>
          </div>
          <!-- Tue -->
          <div class="bar-wrapper">
            <div class="bar" style="height: 160px;"></div>
            <div class="bar-label">T</div>
          </div>
          <!-- Wed -->
          <div class="bar-wrapper">
            <div class="bar" style="height: 130px;"></div>
            <div class="bar-label">W</div>
          </div>
          <!-- Thu (active/current day) -->
          <div class="bar-wrapper">
            <div class="bar active" style="height: 180px;"></div>
            <div class="bar-label active">T</div>
          </div>
          <!-- Fri -->
          <div class="bar-wrapper">
            <div class="bar" style="height: 150px;"></div>
            <div class="bar-label">F</div>
          </div>
          <!-- Sat -->
          <div class="bar-wrapper">
            <div class="bar" style="height: 190px;"></div>
            <div class="bar-label">S</div>
          </div>
          <!-- Sun -->
          <div class="bar-wrapper">
            <div class="bar" style="height: 120px;"></div>
            <div class="bar-label">S</div>
          </div>
        </div>
      </div>

      <!-- 2x2 Stats grid -->
      <div class="stats-grid">
        <!-- Avg. Calories -->
        <div class="stat-card">
          <div class="stat-card-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF9500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
            Avg. Calories
          </div>
          <div class="stat-card-value" style="color: #FF9500;">1,892</div>
          <div class="stat-card-goal">Goal: 2,100</div>
        </div>
        <!-- Avg. Protein -->
        <div class="stat-card">
          <div class="stat-card-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
            Avg. Protein
          </div>
          <div class="stat-card-value" style="color: #FF6B6B;">132g</div>
          <div class="stat-card-goal">Goal: 150g</div>
        </div>
        <!-- Water Intake -->
        <div class="stat-card">
          <div class="stat-card-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5AC8FA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L5.5 13c-1.3 2.2-.5 4.5 1 6s3.8 2 6.5 2 5-0.5 6.5-2 2.3-3.8 1-6L12 2z"/></svg>
            Water Intake
          </div>
          <div class="stat-card-value" style="color: #5AC8FA;">82oz</div>
          <div class="stat-card-goal">Goal: 88oz</div>
        </div>
        <!-- Consistency -->
        <div class="stat-card">
          <div class="stat-card-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            Consistency
          </div>
          <div class="stat-card-value" style="color: #34C759;">94%</div>
          <div class="stat-card-goal">Logged 6/7 days</div>
        </div>
      </div>

      <!-- Weight Trend card -->
      <div class="trend-card">
        <div class="trend-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 6l-9.5 9.5-5-5L1 18"/><path d="M17 6h6v6"/></svg>
          Weight Trend
        </div>
        <svg class="trend-chart" viewBox="0 0 560 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Subtle horizontal grid -->
          <line x1="40" y1="20" x2="520" y2="20" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
          <line x1="40" y1="55" x2="520" y2="55" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
          <line x1="40" y1="90" x2="520" y2="90" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

          <!-- Green fill area under curve -->
          <path d="M40 30 C120 35, 180 50, 200 55 C220 60, 300 68, 360 75 C420 82, 480 88, 520 95 L520 120 L40 120 Z" fill="rgba(52,199,89,0.1)"/>

          <!-- Trend line (gentle downward curve: 183 lbs → 178 lbs) -->
          <path d="M40 30 C120 35, 180 50, 200 55 C220 60, 300 68, 360 75 C420 82, 480 88, 520 95" stroke="#34C759" stroke-width="3" stroke-linecap="round" fill="none"/>

          <!-- Dot markers -->
          <circle cx="40" cy="30" r="8" fill="#34C759" stroke="white" stroke-width="2"/>
          <circle cx="200" cy="55" r="8" fill="#34C759" stroke="white" stroke-width="2"/>
          <circle cx="360" cy="75" r="8" fill="#34C759" stroke="white" stroke-width="2"/>
          <circle cx="520" cy="95" r="8" fill="#34C759" stroke="white" stroke-width="2"/>

          <!-- Y-axis labels -->
          <text x="35" y="26" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Inter, sans-serif" font-size="14" font-weight="600">183</text>
          <text x="35" y="100" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Inter, sans-serif" font-size="14" font-weight="600">178</text>

          <!-- X-axis labels -->
          <text x="40" y="138" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="16">Week 1</text>
          <text x="200" y="138" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="16">Week 2</text>
          <text x="360" y="138" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="16">Week 3</text>
          <text x="520" y="138" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="16">Week 4</text>
        </svg>
      </div>
    </div>
  </div>
</div>

<div class="bottom-glow"></div>

</body>
</html>
