<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1284px;
  height: 2778px;
  background: #0A0A14;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Background gradient */
.bg-gradient {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(52,199,89,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 70%, rgba(255,149,0,0.08) 0%, transparent 50%);
}

/* Marketing headline area */
.headline-area {
  position: relative;
  z-index: 10;
  text-align: center;
  padding-top: 180px;
  padding-bottom: 60px;
}

.badge {
  display: inline-block;
  background: rgba(52,199,89,0.15);
  border: 1px solid rgba(52,199,89,0.3);
  color: #34C759;
  font-size: 28px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  padding: 12px 32px;
  border-radius: 50px;
  margin-bottom: 48px;
}

.headline {
  font-family: 'Outfit', sans-serif;
  font-size: 96px;
  font-weight: 900;
  color: white;
  line-height: 1.05;
  margin-bottom: 32px;
}

.headline .green { color: #34C759; }

.subheadline {
  font-size: 36px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  line-height: 1.5;
  max-width: 900px;
  margin: 0 auto;
}

/* Phone mockup */
.phone-container {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
}

.phone {
  width: 680px;
  height: 1400px;
  background: #12121A;
  border-radius: 60px;
  border: 4px solid rgba(255,255,255,0.1);
  overflow: hidden;
  position: relative;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(52,199,89,0.1);
}

/* Dynamic Island */
.dynamic-island {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 44px;
  background: black;
  border-radius: 22px;
  z-index: 20;
}

/* Status bar */
.status-bar {
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  color: white;
  font-size: 22px;
  font-weight: 600;
}

/* Camera viewfinder */
.camera-view {
  position: relative;
  width: 100%;
  height: 100%;
  background: #1A1A24;
}

/* Camera header bar */
.camera-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 32px;
}

.camera-back {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.camera-title {
  font-family: 'Outfit', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: white;
}

.camera-flash {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Food photo area */
.food-area {
  position: relative;
  margin: 40px auto 0;
  width: 540px;
  height: 380px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Simulated food photo */
.food-photo {
  width: 500px;
  height: 350px;
  border-radius: 20px;
  background:
    radial-gradient(ellipse at 35% 40%, rgba(210,140,60,0.9) 0%, transparent 50%),
    radial-gradient(ellipse at 65% 35%, rgba(180,120,50,0.8) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 60%, rgba(120,160,80,0.7) 0%, transparent 40%),
    radial-gradient(ellipse at 30% 70%, rgba(200,80,60,0.5) 0%, transparent 35%),
    radial-gradient(ellipse at 70% 65%, rgba(245,200,120,0.6) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 50%, rgba(160,120,60,0.9) 0%, transparent 60%),
    linear-gradient(145deg, #8B6914 0%, #A67B2E 25%, #6B8C42 50%, #C4873B 75%, #9B7530 100%);
  position: relative;
  overflow: hidden;
}

/* Plate rim effect */
.food-photo::before {
  content: '';
  position: absolute;
  inset: 8px;
  border-radius: 16px;
  border: 2px solid rgba(255,255,255,0.08);
}

/* Food texture overlay */
.food-photo::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background:
    radial-gradient(circle at 25% 30%, rgba(255,255,255,0.12) 0%, transparent 20%),
    radial-gradient(circle at 60% 25%, rgba(255,255,255,0.08) 0%, transparent 15%),
    radial-gradient(circle at 45% 55%, rgba(255,255,255,0.06) 0%, transparent 25%),
    radial-gradient(circle at 75% 60%, rgba(0,0,0,0.15) 0%, transparent 20%);
}

/* Scanning corners — four L-shaped brackets */
.scan-corner {
  position: absolute;
  width: 50px;
  height: 50px;
}

.scan-corner--tl {
  top: 0;
  left: 0;
  border-top: 3px solid #34C759;
  border-left: 3px solid #34C759;
  border-top-left-radius: 8px;
}

.scan-corner--tr {
  top: 0;
  right: 0;
  border-top: 3px solid #34C759;
  border-right: 3px solid #34C759;
  border-top-right-radius: 8px;
}

.scan-corner--bl {
  bottom: 0;
  left: 0;
  border-bottom: 3px solid #34C759;
  border-left: 3px solid #34C759;
  border-bottom-left-radius: 8px;
}

.scan-corner--br {
  bottom: 0;
  right: 0;
  border-bottom: 3px solid #34C759;
  border-right: 3px solid #34C759;
  border-bottom-right-radius: 8px;
}

/* Scanning line */
.scan-line {
  position: absolute;
  top: 45%;
  left: 20px;
  right: 20px;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, #34C759 20%, #34C759 80%, transparent 100%);
  box-shadow: 0 0 12px rgba(52,199,89,0.5), 0 0 4px rgba(52,199,89,0.3);
}

/* Results card */
.results-card {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: #16161F;
  border-radius: 24px 24px 0 0;
  padding: 32px 32px 40px;
}

.results-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,199,89,0.3), transparent);
}

/* Drag handle */
.results-handle {
  width: 48px;
  height: 5px;
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
  margin: 0 auto 24px;
}

.results-food-name {
  font-family: 'Outfit', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: white;
  margin-bottom: 6px;
}

.results-confidence {
  font-size: 18px;
  color: #34C759;
  font-weight: 600;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Macro row */
.macro-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
}

.macro-item {
  flex: 1;
  text-align: center;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 18px 8px;
}

.macro-value {
  font-family: 'Outfit', sans-serif;
  font-size: 32px;
  font-weight: 800;
  line-height: 1.2;
}

.macro-value.calories { color: #FF9500; }
.macro-value.protein { color: #FF6B6B; }
.macro-value.carbs { color: #4ECDC4; }
.macro-value.fat { color: #FFE66D; }

.macro-label {
  font-size: 16px;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
  margin-top: 4px;
}

/* Bottom glow */
.bottom-glow {
  position: absolute;
  bottom: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(52,199,89,0.2) 0%, transparent 70%);
  filter: blur(60px);
  z-index: 5;
}
</style>
</head>
<body>

<div class="bg-gradient"></div>

<!-- Headline -->
<div class="headline-area">
  <div class="badge">AI Vision</div>
  <div class="headline">Snap. Scan.<br><span class="green">Log.</span></div>
  <div class="subheadline">Point your camera at any food.<br>AI identifies it and logs macros instantly.</div>
</div>

<!-- Phone mockup -->
<div class="phone-container">
  <div class="phone">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span>9:41</span>
      <span></span>
    </div>

    <div class="camera-view">
      <!-- Camera header -->
      <div class="camera-header">
        <!-- Back chevron -->
        <div class="camera-back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </div>
        <div class="camera-title">AI Food Scan</div>
        <!-- Flash icon -->
        <div class="camera-flash">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            <line x1="4" y1="4" x2="20" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
          </svg>
        </div>
      </div>

      <!-- Food photo with scanning overlay -->
      <div class="food-area">
        <div class="food-photo"></div>
        <div class="scan-corner scan-corner--tl"></div>
        <div class="scan-corner scan-corner--tr"></div>
        <div class="scan-corner scan-corner--bl"></div>
        <div class="scan-corner scan-corner--br"></div>
        <div class="scan-line"></div>
      </div>

      <!-- Results card sliding up -->
      <div class="results-card">
        <div class="results-handle"></div>
        <div class="results-food-name">Grilled Chicken Salad</div>
        <div class="results-confidence">
          <!-- Checkmark circle icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="9 12 11.5 14.5 16 9.5"/>
          </svg>
          Identified with 97% confidence
        </div>

        <div class="macro-row">
          <div class="macro-item">
            <div class="macro-value calories">485</div>
            <div class="macro-label">Calories</div>
          </div>
          <div class="macro-item">
            <div class="macro-value protein">42g</div>
            <div class="macro-label">Protein</div>
          </div>
          <div class="macro-item">
            <div class="macro-value carbs">38g</div>
            <div class="macro-label">Carbs</div>
          </div>
          <div class="macro-item">
            <div class="macro-value fat">18g</div>
            <div class="macro-label">Fat</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-glow"></div>

</body>
</html>
