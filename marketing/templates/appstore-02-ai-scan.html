<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw;
  height: 100vh;
  background: #0A0A14;
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── Dynamic Island ── */
.dynamic-island {
  position: absolute;
  top: 1.2%;
  left: 50%;
  transform: translateX(-50%);
  width: 27%;
  max-width: 160px;
  height: 3.4%;
  max-height: 36px;
  background: #000;
  border-radius: 20px;
  z-index: 30;
}

/* ── Status Bar ── */
.status-bar {
  flex-shrink: 0;
  height: 5.4%;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 7% 0.6%;
  z-index: 20;
}

.status-time {
  font-size: 1.25em;
  font-weight: 700;
  color: white;
}

.status-icons {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── Nav Bar ── */
.nav-bar {
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.5% 5% 2%;
}

.nav-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.4em;
  font-weight: 800;
  color: white;
}

/* ── Camera / Viewfinder Area ── */
.camera-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Simulated food photo fills entire camera area */
.camera-photo {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(230,160,60,0.95) 0%, transparent 40%),
    radial-gradient(ellipse at 60% 25%, rgba(200,140,55,0.85) 0%, transparent 35%),
    radial-gradient(ellipse at 75% 55%, rgba(140,180,90,0.75) 0%, transparent 32%),
    radial-gradient(ellipse at 20% 65%, rgba(220,100,70,0.6) 0%, transparent 30%),
    radial-gradient(ellipse at 65% 75%, rgba(250,210,130,0.65) 0%, transparent 35%),
    radial-gradient(ellipse at 45% 50%, rgba(190,140,60,0.9) 0%, transparent 50%),
    linear-gradient(145deg, #7A5B1A 0%, #A67B2E 20%, #6B8C42 45%, #C4873B 70%, #8B6914 100%);
}

.camera-photo::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 28% 28%, rgba(255,255,255,0.14) 0%, transparent 22%),
    radial-gradient(circle at 62% 22%, rgba(255,255,255,0.09) 0%, transparent 16%),
    radial-gradient(circle at 50% 58%, rgba(255,255,255,0.06) 0%, transparent 28%);
}

/* Scan corners overlaying the camera */
.scan-corner {
  position: absolute;
  width: 50px;
  height: 50px;
  z-index: 5;
}
.scan-corner--tl { top: 8%; left: 8%; border-top: 3px solid #34C759; border-left: 3px solid #34C759; border-top-left-radius: 12px; }
.scan-corner--tr { top: 8%; right: 8%; border-top: 3px solid #34C759; border-right: 3px solid #34C759; border-top-right-radius: 12px; }
.scan-corner--bl { bottom: 32%; left: 8%; border-bottom: 3px solid #34C759; border-left: 3px solid #34C759; border-bottom-left-radius: 12px; }
.scan-corner--br { bottom: 32%; right: 8%; border-bottom: 3px solid #34C759; border-right: 3px solid #34C759; border-bottom-right-radius: 12px; }

/* Scan line */
.scan-line {
  position: absolute;
  top: 38%;
  left: 10%;
  right: 10%;
  height: 2px;
  z-index: 6;
  background: linear-gradient(90deg, transparent 0%, #34C759 15%, #34C759 85%, transparent 100%);
  box-shadow: 0 0 20px rgba(52,199,89,0.5), 0 0 8px rgba(52,199,89,0.3);
}

/* Analyzing badge */
.analyzing-badge {
  position: absolute;
  top: 46%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  padding: 8px 20px;
  border-radius: 20px;
  border: 1px solid rgba(52,199,89,0.3);
}

.analyzing-dot {
  width: 8px;
  height: 8px;
  background: #34C759;
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(52,199,89,0.6);
}

.analyzing-text {
  font-size: 0.9em;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
}

/* ── Results Bottom Sheet ── */
.results-sheet {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  background: #12121A;
  border-top-left-radius: 28px;
  border-top-right-radius: 28px;
  padding: 2.5% 6% 0;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
}

.results-sheet::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,199,89,0.4), transparent);
  border-radius: 28px 28px 0 0;
}

.drag-handle {
  width: 40px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  margin: 0 auto 3.5%;
}

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4%;
}

.food-name {
  font-family: 'Outfit', sans-serif;
  font-size: 1.6em;
  font-weight: 800;
  color: white;
}

.confidence-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(52,199,89,0.12);
  border: 1px solid rgba(52,199,89,0.25);
  color: #34C759;
  font-size: 0.85em;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
}

.confidence-dot {
  width: 6px;
  height: 6px;
  background: #34C759;
  border-radius: 50%;
}

/* Macro pills */
.macro-row {
  display: flex;
  gap: 3%;
  margin-bottom: 4.5%;
}

.macro-pill {
  flex: 1;
  text-align: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 3.5% 2%;
}

.macro-value {
  font-family: 'Outfit', sans-serif;
  font-size: 1.5em;
  font-weight: 800;
  line-height: 1.2;
}

.macro-value.cal { color: #FF9500; }
.macro-value.protein { color: #FF6B6B; }
.macro-value.carbs { color: #4ECDC4; }
.macro-value.fat { color: #FFE66D; }

.macro-label {
  font-size: 0.7em;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Add button */
.add-button {
  width: 100%;
  padding: 4% 0;
  background: #34C759;
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 1.1em;
  font-weight: 700;
  border: none;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* Home indicator */
.home-indicator {
  height: 3.5%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #12121A;
}

.home-bar {
  width: 36%;
  max-width: 140px;
  height: 5px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
}
</style>
</head>
<body>

<div class="dynamic-island"></div>

<div class="status-bar">
  <span class="status-time">9:41</span>
  <div class="status-icons">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
      <rect x="0" y="10" width="3" height="4" rx="0.5" fill="white"/>
      <rect x="4.5" y="7" width="3" height="7" rx="0.5" fill="white"/>
      <rect x="9" y="4" width="3" height="10" rx="0.5" fill="white"/>
      <rect x="13.5" y="0" width="3" height="14" rx="0.5" fill="white"/>
    </svg>
    <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
      <path d="M8 12.5a1.25 1.25 0 100-2.5 1.25 1.25 0 000 2.5z" fill="white"/>
      <path d="M4.5 9a5 5 0 017 0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M2 6a9 9 0 0112 0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <svg width="28" height="14" viewBox="0 0 28 14" fill="none">
      <rect x="0.5" y="0.5" width="23" height="13" rx="3" stroke="white" stroke-opacity="0.35"/>
      <rect x="2" y="2" width="20" height="10" rx="2" fill="white"/>
      <rect x="25" y="4" width="2" height="6" rx="1" fill="white" fill-opacity="0.4"/>
    </svg>
  </div>
</div>

<div class="nav-bar">
  <div class="nav-icon">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </div>
  <div class="nav-title">AI Food Scanner</div>
  <div class="nav-icon">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </svg>
  </div>
</div>

<!-- Camera fills remaining space -->
<div class="camera-area">
  <div class="camera-photo"></div>
  <div class="scan-corner scan-corner--tl"></div>
  <div class="scan-corner scan-corner--tr"></div>
  <div class="scan-corner scan-corner--bl"></div>
  <div class="scan-corner scan-corner--br"></div>
  <div class="scan-line"></div>
  <div class="analyzing-badge">
    <div class="analyzing-dot"></div>
    <span class="analyzing-text">Analyzing...</span>
  </div>

  <!-- Results as bottom sheet overlapping camera -->
  <div class="results-sheet">
    <div class="drag-handle"></div>
    <div class="result-header">
      <div class="food-name">Grilled Chicken Salad</div>
      <div class="confidence-pill">
        <div class="confidence-dot"></div>
        97%
      </div>
    </div>
    <div class="macro-row">
      <div class="macro-pill">
        <div class="macro-value cal">420</div>
        <div class="macro-label">Cal</div>
      </div>
      <div class="macro-pill">
        <div class="macro-value protein">38g</div>
        <div class="macro-label">Protein</div>
      </div>
      <div class="macro-pill">
        <div class="macro-value carbs">24g</div>
        <div class="macro-label">Carbs</div>
      </div>
      <div class="macro-pill">
        <div class="macro-value fat">18g</div>
        <div class="macro-label">Fat</div>
      </div>
    </div>
    <button class="add-button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Add to Meal Log
    </button>
  </div>
</div>

<div class="home-indicator">
  <div class="home-bar"></div>
</div>

</body>
</html>
