<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100vw;
  height: 100vh;
  background: #0A0A14;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Subtle ambient glow behind content */
.bg-glow {
  position: absolute;
  top: 15vh;
  left: 50%;
  transform: translateX(-50%);
  width: 80vw;
  height: 40vh;
  background: radial-gradient(ellipse, rgba(255,149,0,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ============ STATUS BAR ============ */
.status-bar {
  position: relative;
  z-index: 10;
  height: 5.4vh;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 6.5vw 0.6vh;
  color: white;
  font-size: 1.6vh;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.status-bar-left {
  width: 20vw;
}

.status-bar-right {
  width: 20vw;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 0.8vw;
  font-size: 1.4vh;
  font-weight: 500;
}

.status-bar-right .signal {
  display: flex;
  gap: 0.3vw;
  align-items: flex-end;
}

.status-bar-right .signal span {
  display: block;
  width: 0.6vw;
  border-radius: 0.15vw;
  background: white;
}

.status-bar-right .signal span:nth-child(1) { height: 0.6vh; }
.status-bar-right .signal span:nth-child(2) { height: 0.9vh; }
.status-bar-right .signal span:nth-child(3) { height: 1.2vh; }
.status-bar-right .signal span:nth-child(4) { height: 1.5vh; }

.status-bar-right .wifi {
  font-size: 1.5vh;
}

.status-bar-right .battery {
  display: flex;
  align-items: center;
  gap: 0.3vw;
}

.battery-body {
  width: 5vw;
  height: 1.8vh;
  border: 1.5px solid white;
  border-radius: 0.5vh;
  padding: 1.5px;
  position: relative;
}

.battery-body::after {
  content: '';
  position: absolute;
  right: -2.2px;
  top: 50%;
  transform: translate(100%, -50%);
  width: 1.5px;
  height: 0.7vh;
  background: white;
  border-radius: 0 1px 1px 0;
}

.battery-fill {
  width: 80%;
  height: 100%;
  background: white;
  border-radius: 0.25vh;
}

/* ============ DYNAMIC ISLAND ============ */
.dynamic-island {
  position: absolute;
  top: 1.2vh;
  left: 50%;
  transform: translateX(-50%);
  width: 28vw;
  height: 3.6vh;
  background: #000000;
  border-radius: 2vh;
  z-index: 20;
}

/* ============ MAIN CONTENT ============ */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 1.5vh 5.5vw 0;
  position: relative;
  z-index: 1;
  overflow: hidden;
}

/* ============ DASHBOARD HEADER ============ */
.dash-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3vh;
}

.dash-header-text {}

.dash-greeting {
  font-size: 1.8vh;
  color: rgba(255,255,255,0.45);
  font-weight: 500;
  margin-bottom: 0.3vh;
}

.dash-title {
  font-family: 'Outfit', sans-serif;
  font-size: 3.6vh;
  font-weight: 800;
  color: white;
  letter-spacing: -0.02em;
}

.dash-avatar {
  width: 5.2vh;
  height: 5.2vh;
  background: linear-gradient(135deg, #34C759 0%, #28A745 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 2.2vh;
  flex-shrink: 0;
  box-shadow: 0 0.4vh 1.5vh rgba(52,199,89,0.3);
}

/* ============ CALORIE + MACRO SECTION ============ */
.ring-section {
  display: flex;
  align-items: center;
  gap: 5vw;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 3.2vh;
  padding: 3vh 4.5vw;
  margin-bottom: 2.8vh;
}

/* --- Calorie Ring --- */
.main-ring {
  position: relative;
  width: 22vh;
  height: 22vh;
  flex-shrink: 0;
}

.main-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-bg {
  fill: none;
  stroke: rgba(255,149,0,0.12);
  stroke-width: 10;
}

.ring-fill {
  fill: none;
  stroke: #FF9500;
  stroke-width: 10;
  stroke-linecap: round;
  /* circumference = 2 * pi * 80 = 502.65; 74% filled: offset = 502.65 * 0.26 = 130.7 */
  stroke-dasharray: 502.65;
  stroke-dashoffset: 130.7;
  filter: drop-shadow(0 0 8px rgba(255,149,0,0.4));
}

.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.ring-number {
  font-family: 'Outfit', sans-serif;
  font-size: 4.8vh;
  font-weight: 900;
  color: #FF9500;
  letter-spacing: -0.02em;
  line-height: 1;
}

.ring-label {
  font-size: 1.4vh;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-weight: 600;
  margin-top: 0.4vh;
}

/* --- Macro Bars --- */
.macro-bars {
  display: flex;
  flex-direction: column;
  gap: 2.2vh;
  flex: 1;
  min-width: 0;
}

.macro-bar {}

.macro-bar-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.8vh;
}

.macro-bar-name {
  font-size: 1.6vh;
  font-weight: 600;
  color: rgba(255,255,255,0.55);
}

.macro-bar-value {
  font-size: 1.5vh;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  font-variant-numeric: tabular-nums;
}

.macro-bar-track {
  height: 1vh;
  background: rgba(255,255,255,0.06);
  border-radius: 0.5vh;
  overflow: hidden;
}

.macro-bar-fill {
  height: 100%;
  border-radius: 0.5vh;
  transition: width 0.6s ease;
}

.protein-fill { background: linear-gradient(90deg, #FF6B6B, #FF8E8E); width: 72%; }
.carbs-fill   { background: linear-gradient(90deg, #4ECDC4, #6EE7DE); width: 58%; }
.fat-fill     { background: linear-gradient(90deg, #FFE66D, #FFF0A0); width: 45%; }

/* ============ TODAY'S MEALS ============ */
.meals-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.meals-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.8vh;
}

.meals-title {
  font-family: 'Outfit', sans-serif;
  font-size: 2.2vh;
  font-weight: 700;
  color: white;
  letter-spacing: -0.01em;
}

.meals-count {
  font-size: 1.4vh;
  color: rgba(255,255,255,0.3);
  font-weight: 500;
}

.meals-list {
  display: flex;
  flex-direction: column;
  gap: 1.4vh;
}

.meal-card {
  display: flex;
  align-items: center;
  gap: 3.5vw;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 2.2vh;
  padding: 2vh 3.5vw;
}

.meal-icon {
  width: 5.5vh;
  height: 5.5vh;
  border-radius: 1.5vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.meal-icon.breakfast { background: rgba(255,149,0,0.12); }
.meal-icon.lunch     { background: rgba(52,199,89,0.12); }
.meal-icon.snack     { background: rgba(90,200,250,0.12); }

.meal-icon svg {
  width: 2.8vh;
  height: 2.8vh;
}

.meal-info {
  flex: 1;
  min-width: 0;
}

.meal-name {
  font-size: 1.8vh;
  font-weight: 700;
  color: white;
  margin-bottom: 0.3vh;
}

.meal-desc {
  font-size: 1.4vh;
  color: rgba(255,255,255,0.35);
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.meal-cals {
  font-family: 'Outfit', sans-serif;
  font-size: 2.2vh;
  font-weight: 800;
  color: #FF9500;
  flex-shrink: 0;
}

.meal-cals-unit {
  font-size: 1.2vh;
  font-weight: 500;
  color: rgba(255,149,0,0.6);
  margin-left: 0.2vw;
}

/* ============ BOTTOM TAB BAR ============ */
.tab-bar {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 1.5vh 2vw 4vh;
  position: relative;
  z-index: 10;
}

.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5vh;
}

.tab-item svg {
  width: 2.6vh;
  height: 2.6vh;
}

.tab-item span {
  font-size: 1.1vh;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.tab-item.active svg { opacity: 1; }
.tab-item.active span { color: #34C759; }
.tab-item.inactive svg { opacity: 0.35; }
.tab-item.inactive span { color: rgba(255,255,255,0.35); }

/* Scan button (center) */
.tab-scan {
  width: 6.5vh;
  height: 6.5vh;
  background: linear-gradient(135deg, #34C759, #28A745);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0.5vh 2vh rgba(52,199,89,0.4);
  margin-top: -1.5vh;
}

.tab-scan svg {
  width: 3vh;
  height: 3vh;
}

/* Home indicator */
.home-indicator {
  position: absolute;
  bottom: 1vh;
  left: 50%;
  transform: translateX(-50%);
  width: 30vw;
  height: 0.5vh;
  background: rgba(255,255,255,0.2);
  border-radius: 0.25vh;
  z-index: 10;
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- Dynamic Island -->
