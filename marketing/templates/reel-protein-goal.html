<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  background: #0A0A14;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  position: relative;
}

/* Ambient gradient orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0;
  animation: orbPulse 10s ease-in-out infinite;
}
.orb-1 {
  width: 600px; height: 600px;
  background: #FF6B6B;
  top: -200px; left: -100px;
}
.orb-2 {
  width: 500px; height: 500px;
  background: #34C759;
  bottom: 200px; right: -150px;
  animation-delay: 3s;
}
.orb-3 {
  width: 400px; height: 400px;
  background: #FF9500;
  top: 50%; left: 50%;
  transform: translateX(-50%);
  animation-delay: 6s;
}

@keyframes orbPulse {
  0%, 100% { opacity: 0.06; }
  50% { opacity: 0.14; }
}

/* Floating particles */
.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
}
.particle:nth-child(1) { width: 4px; height: 4px; background: rgba(255,107,107,0.4); left: 8%; animation: particleUp 9s ease-in-out 0s infinite; }
.particle:nth-child(2) { width: 5px; height: 5px; background: rgba(52,199,89,0.3); left: 22%; animation: particleUp 11s ease-in-out 1s infinite; }
.particle:nth-child(3) { width: 3px; height: 3px; background: rgba(255,149,0,0.3); left: 38%; animation: particleUp 8s ease-in-out 2s infinite; }
.particle:nth-child(4) { width: 4px; height: 4px; background: rgba(255,107,107,0.25); left: 55%; animation: particleUp 10s ease-in-out 0.5s infinite; }
.particle:nth-child(5) { width: 6px; height: 6px; background: rgba(52,199,89,0.2); left: 68%; animation: particleUp 12s ease-in-out 3s infinite; }
.particle:nth-child(6) { width: 3px; height: 3px; background: rgba(255,107,107,0.25); left: 80%; animation: particleUp 9s ease-in-out 1.5s infinite; }
.particle:nth-child(7) { width: 5px; height: 5px; background: rgba(52,199,89,0.2); left: 92%; animation: particleUp 13s ease-in-out 4s infinite; }
.particle:nth-child(8) { width: 4px; height: 4px; background: rgba(255,149,0,0.3); left: 48%; animation: particleUp 10s ease-in-out 2.5s infinite; }

@keyframes particleUp {
  0%, 100% { bottom: -20px; opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { bottom: 1940px; opacity: 0; }
}

/* Grain overlay */
.grain {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  z-index: 100;
  pointer-events: none;
}

/* Scene container */
.scene {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 60px;
}

/* ---- Scene 1: Hook (0.3s - 3.0s) ---- */
.scene-hook {
  opacity: 0;
  animation: sceneIn 0.6s ease-out 0.3s forwards, sceneOut 0.5s ease-in 3.0s forwards;
}
.hook-text {
  font-family: 'Outfit', sans-serif;
  font-size: 96px;
  font-weight: 900;
  color: white;
  text-align: center;
  line-height: 1.05;
  text-transform: uppercase;
  letter-spacing: -3px;
}
.hook-text .protein { color: #FF6B6B; }
.hook-text .green { color: #34C759; }
.hook-sub {
  font-size: 30px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-top: 28px;
  letter-spacing: 4px;
  text-transform: uppercase;
}

/* ---- Scene 2: Protein Ring (3.5s - 7.5s) ---- */
.scene-ring {
  opacity: 0;
  animation: sceneIn 0.6s ease-out 3.5s forwards, sceneOut 0.5s ease-in 7.5s forwards;
}

.ring-container {
  position: relative;
  width: 400px;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}

.ring-svg {
  width: 400px;
  height: 400px;
  transform: rotate(-90deg);
}
.ring-bg {
  fill: none;
  stroke: rgba(255,107,107,0.1);
  stroke-width: 20;
}
.ring-progress {
  fill: none;
  stroke: #FF6B6B;
  stroke-width: 20;
  stroke-linecap: round;
  stroke-dasharray: 1100;
  stroke-dashoffset: 1100;
  animation: proteinRingFill 3s ease-out 4.0s forwards;
  filter: drop-shadow(0 0 12px rgba(255,107,107,0.5));
}
@keyframes proteinRingFill {
  to { stroke-dashoffset: 165; }
}

.ring-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.ring-number {
  font-family: 'Outfit', sans-serif;
  font-size: 100px;
  font-weight: 900;
  color: white;
  line-height: 1;
  opacity: 0;
  animation: scaleIn 0.5s ease-out 5.0s forwards;
}
.ring-unit {
  font-family: 'Outfit', sans-serif;
  font-size: 36px;
  font-weight: 600;
  color: rgba(255,255,255,0.4);
}
.ring-target {
  font-size: 28px;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
  opacity: 0;
  animation: fadeIn 0.4s ease-out 5.3s forwards;
}

/* Glow ring pulse */
.ring-glow {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  border: 2px solid rgba(255,107,107,0.2);
  opacity: 0;
  animation: ringGlow 2s ease-in-out 5.8s infinite;
}
@keyframes ringGlow {
  0%, 100% { transform: scale(1); opacity: 0; }
  50% { transform: scale(1.06); opacity: 0.4; }
}

/* Food cards */
.food-cards {
  position: relative;
  width: 100%;
  max-width: 700px;
  height: 280px;
  margin-top: 40px;
}
.food-card {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(255,107,107,0.06);
  border: 1px solid rgba(255,107,107,0.15);
  border-radius: 20px;
  padding: 18px 28px;
  opacity: 0;
}
.food-card-icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: rgba(255,107,107,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.food-card-text {
  font-family: 'Outfit', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: white;
}
.food-card-grams {
  font-family: 'Outfit', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #FF6B6B;
  margin-left: auto;
  white-space: nowrap;
}

.food-card-1 {
  top: 0; left: 0; right: 50%;
  animation: slideFromLeft 0.5s ease-out 5.6s forwards;
}
.food-card-2 {
  top: 0; left: 50%; right: 0;
  animation: slideFromRight 0.5s ease-out 5.9s forwards;
}
.food-card-3 {
  top: 90px; left: 0; right: 50%;
  animation: slideFromLeft 0.5s ease-out 6.2s forwards;
}
.food-card-4 {
  top: 90px; left: 50%; right: 0;
  animation: slideFromRight 0.5s ease-out 6.5s forwards;
}

@keyframes slideFromLeft {
  from { opacity: 0; transform: translateX(-60px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideFromRight {
  from { opacity: 0; transform: translateX(60px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Food card row layout (stacked vertically) */
.food-card {
  left: 60px;
  right: 60px;
}
.food-card-1 { top: 0; }
.food-card-2 { top: 90px; }
.food-card-3 { top: 180px; }
.food-card-4 { top: 270px; }

.food-cards {
  height: 360px;
}

/* ---- Scene 3: Achievement (8.0s - 11.5s) ---- */
.scene-achieve {
  opacity: 0;
  animation: sceneIn 0.8s ease-out 8.0s forwards, sceneOut 0.5s ease-in 11.5s forwards;
}
.achieve-number {
  font-family: 'Outfit', sans-serif;
  font-size: 160px;
  font-weight: 900;
  color: #FF6B6B;
  line-height: 1;
  text-shadow: 0 0 80px rgba(255,107,107,0.4);
}
.achieve-label {
  font-family: 'Outfit', sans-serif;
  font-size: 44px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  margin-top: 8px;
  margin-bottom: 48px;
}
.achieve-badge {
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(52,199,89,0.08);
  border: 2px solid rgba(52,199,89,0.25);
  border-radius: 24px;
  padding: 24px 48px;
  box-shadow: 0 0 60px rgba(52,199,89,0.15);
  opacity: 0;
  animation: scaleIn 0.5s ease-out 8.7s forwards;
}
.badge-check {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(52,199,89,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
}
.badge-text {
  font-family: 'Outfit', sans-serif;
  font-size: 40px;
  font-weight: 800;
  color: #34C759;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.achieve-progress {
  font-size: 28px;
  color: rgba(255,255,255,0.4);
  margin-top: 36px;
  opacity: 0;
  animation: fadeIn 0.4s ease-out 9.1s forwards;
}

/* Confetti dots */
.confetti {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
}
.confetti-1 { width: 10px; height: 10px; background: #FF6B6B; top: 25%; left: 12%; animation: confettiIn 0.4s ease-out 8.3s forwards; }
.confetti-2 { width: 8px; height: 8px; background: #34C759; top: 18%; right: 15%; animation: confettiIn 0.4s ease-out 8.5s forwards; }
.confetti-3 { width: 12px; height: 12px; background: #FF9500; top: 30%; right: 20%; animation: confettiIn 0.4s ease-out 8.8s forwards; }
.confetti-4 { width: 7px; height: 7px; background: #4ECDC4; top: 22%; left: 25%; animation: confettiIn 0.4s ease-out 9.0s forwards; }
.confetti-5 { width: 9px; height: 9px; background: #FFE66D; bottom: 30%; left: 10%; animation: confettiIn 0.4s ease-out 9.2s forwards; }
.confetti-6 { width: 11px; height: 11px; background: #5AC8FA; bottom: 25%; right: 12%; animation: confettiIn 0.4s ease-out 9.5s forwards; }
.confetti-7 { width: 8px; height: 8px; background: #FF6B6B; bottom: 35%; left: 22%; animation: confettiIn 0.4s ease-out 9.7s forwards; }
.confetti-8 { width: 10px; height: 10px; background: #34C759; bottom: 28%; right: 25%; animation: confettiIn 0.4s ease-out 10.0s forwards; }
.confetti-9 { width: 6px; height: 6px; background: #FF9500; top: 35%; left: 18%; animation: confettiIn 0.4s ease-out 10.2s forwards; }
.confetti-10 { width: 9px; height: 9px; background: #4ECDC4; top: 28%; right: 10%; animation: confettiIn 0.4s ease-out 10.5s forwards; }

@keyframes confettiIn {
  from { opacity: 0; transform: scale(0) rotate(0deg); }
  to { opacity: 0.8; transform: scale(1) rotate(180deg); }
}

/* ---- Scene 4: CTA (12.0s - 15.0s) ---- */
.scene-cta {
  opacity: 0;
  animation: sceneIn 0.8s ease-out 12.0s forwards;
}
.cta-logo {
  font-family: 'Outfit', sans-serif;
  font-size: 80px;
  font-weight: 900;
  color: white;
  margin-bottom: 16px;
}
.cta-logo .green { color: #34C759; }
.cta-tagline {
  font-size: 30px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-bottom: 52px;
}
.cta-button {
  background: linear-gradient(135deg, #34C759, #2DD870);
  padding: 28px 88px;
  border-radius: 24px;
  font-family: 'Outfit', sans-serif;
  font-size: 34px;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  letter-spacing: 3px;
  box-shadow: 0 12px 40px rgba(52,199,89,0.4);
  animation: pulse 2s ease-in-out 12.5s infinite;
  position: relative;
  overflow: hidden;
}
.cta-button::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  animation: shimmer 3s ease-in-out 12.5s infinite;
}
.cta-free {
  font-size: 22px;
  color: rgba(255,255,255,0.35);
  margin-top: 24px;
}

/* Shared animations */
@keyframes sceneIn {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes sceneOut {
  from { opacity: 1; }
  to { opacity: 0; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-40px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeIn {
  to { opacity: 1; }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes shimmer {
  0% { left: -100%; }
  100% { left: 200%; }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 12px 40px rgba(52,199,89,0.4); }
  50% { transform: scale(1.04); box-shadow: 0 16px 50px rgba(52,199,89,0.6); }
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="grain"></div>

<!-- Scene 1: Hook -->
<div class="scene scene-hook">

    HIT YOUR<br>
    <span class="protein">PROTEIN</span><br>
    GOAL<br>

<!-- Scene 2: Protein Ring -->

  <div class="ring-container">

      <circle class="ring-bg" cx="200" cy="200" r="175" />

    </svg>
    <div class="ring-glow"></div>
    <div class="ring-center">
      <div class="ring-number">165<span class="ring-unit">g</span></div>

      <div class="food-card-grams">+21g</div>
    </div>
  </div>
</div>

<!-- Scene 3: Achievement -->

  <div class="confetti confetti-1"></div>
  <div class="confetti confetti-2"></div>

<!-- Scene 4: CTA -->
