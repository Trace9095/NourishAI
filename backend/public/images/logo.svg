<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#2AA44A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#E08600"/>
    </linearGradient>
  </defs>
  <!-- Outer circle background -->
  <circle cx="256" cy="256" r="248" fill="#0A0A14"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#leafGrad)" stroke-width="4" opacity="0.3"/>
  <!-- Stylized leaf shape -->
  <path d="M256 80c-80 40-140 120-140 200 0 44 20 80 56 104 20-60 52-108 84-140 32 32 64 80 84 140 36-24 56-60 56-104 0-80-60-160-140-200z" fill="url(#leafGrad)" opacity="0.9"/>
  <!-- Leaf vein / fork tine center -->
  <path d="M256 160v200" stroke="#0A0A14" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <!-- Fork tines -->
  <path d="M230 160v80c0 16 12 28 26 28s26-12 26-28v-80" stroke="#0A0A14" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Small accent circle — calorie/energy dot -->
  <circle cx="256" cy="400" r="16" fill="url(#accentGrad)"/>
  <!-- Fork handle extends down from leaf -->
  <rect x="251" y="360" width="10" height="56" rx="5" fill="#0A0A14" opacity="0.5"/>
</svg>